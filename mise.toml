[tools]
python = "3.13"

[tasks.install]
description = "Install package in editable mode with dev dependencies"
run = "pip install -e '.[print]' && pip install pytest pytest-cov mypy ruff pre-commit"

[tasks.test]
description = "Run tests with coverage"
run = "python -m pytest tests/"

[tasks."test:single"]
description = "Run a single test by pattern, e.g. mise run test:single -- RoundTrip"
run = "python -m pytest tests/ -k \"{{arg(name='pattern')}}\" -v --no-cov"

[tasks.lint]
description = "Run ruff linter"
run = "ruff check ."

[tasks."lint:fix"]
description = "Run ruff linter with auto-fix"
run = "ruff check --fix ."

[tasks.format]
description = "Run ruff formatter"
run = "ruff format ."

[tasks."format:check"]
description = "Check formatting without applying changes"
run = "ruff format --check ."

[tasks.typecheck]
description = "Run mypy strict type checking on library code"
run = "mypy parade/"

[tasks.check]
description = "Run all checks: lint, format, typecheck, tests"
depends = ["lint", "format:check", "typecheck", "test"]

[tasks.hooks]
description = "Run all pre-commit hooks against entire codebase"
run = "pre-commit run --all-files"

[tasks."hooks:install"]
description = "Install pre-commit hooks into git"
run = "pre-commit install"

[tasks.observe]
description = "Observe a celestial body's phase, e.g. mise run observe -- --body a --epoch 2026 --cycle 3 --constant secret"
run = "python -m parade observe"
raw = true

[tasks.interpret]
description = "Interpret a phase observation, e.g. mise run interpret -- --phase 17 --epoch 2026 --cycle 3 --constant secret"
run = "python -m parade interpret"
raw = true

[tasks.chart]
description = "Chart a constellation, e.g. mise run chart -- --constellation hello --epoch 2026 --constant secret"
run = "python -m parade chart"
raw = true

[tasks.read]
description = "Read a constellation chart, e.g. mise run read -- --phases 17,5,22,11,3 --epoch 2026 --constant secret"
run = "python -m parade read"
raw = true

[tasks.print]
description = "Generate printable ephemeris PDF, e.g. mise run print -- --start 2026 --years 6"
run = "python -m parade.print.cli"
raw = true
